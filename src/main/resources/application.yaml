spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

    data:
      redis:
        host: localhost
        port: 6379

  profiles:
    active: dev
  application:
    name: eurokart
  datasource:
    url: jdbc:postgresql://localhost:5433/eurokartdb
    username: eurokart_user
    password: eurokart_pass
  cache:
    type: redis

logging:
  level:
    org:
      hibernate:
       sql: debug
       orm.jdbc.bind: trace
jwt:
  secret: gjC6rervSO5EzxDXcf5iPS+2dgxgSfmK/RLXsWmvdhY=
  expiration: 86400000
